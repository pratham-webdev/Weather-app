<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f0f1a;
      --bg-card: rgba(255, 255, 255, 0.05);
      --bg-card-hover: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.35);
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
      --success: #22c55e;
      --gradient-sunny: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      --gradient-cloudy: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
      --gradient-rainy: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
      --gradient-snowy: linear-gradient(135deg, #e6dada 0%, #274046 100%);
      --gradient-stormy: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
      --gradient-foggy: linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%);
    }

    [data-theme="light"] {
      --bg-primary: #f0f4f8;
      --bg-card: rgba(255, 255, 255, 0.75);
      --bg-card-hover: rgba(255, 255, 255, 0.95);
      --text-primary: #1a1a2e;
      --text-secondary: rgba(0, 0, 0, 0.55);
      --text-muted: rgba(0, 0, 0, 0.35);
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      opacity: 0.3;
      transition: background 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.5s ease forwards; }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 12px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-hero { height: 280px; border-radius: 24px; margin-bottom: 24px; }
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .skeleton-card { height: 110px; border-radius: 24px; }
    .skeleton-hourly { height: 120px; min-width: 90px; border-radius: 24px; }
    .skeleton-daily { height: 48px; border-radius: 12px; margin-bottom: 8px; }

    .alert-banner {
      padding: 16px 20px;
      margin-bottom: 24px;
      border-radius: 16px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .alert-icon { font-size: 1.5rem; }
    .alert-text { flex: 1; }
    .alert-title { font-weight: 600; margin-bottom: 2px; }
    .alert-desc { font-size: 0.85rem; opacity: 0.8; }

    .share-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .share-btn:hover { transform: scale(1.1); background: var(--accent-hover); }
    .share-btn:active { transform: scale(0.95); }

    .share-toast {
      position: fixed;
      bottom: 90px;
      right: 24px;
      background: var(--accent);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 50;
      animation: fadeIn 0.3s ease;
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .glass-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    [data-theme="light"] .glass-card:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
      padding: 20px 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--gradient-sunny);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-container {
      position: relative;
    }

    .search-input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px 12px 44px;
      font-size: 0.9rem;
      color: var(--text-primary);
      width: 280px;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .search-result-item {
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid var(--border);
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg-card-hover); }

    .search-result-name { font-weight: 500; font-size: 0.9rem; }
    .search-result-country { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:hover { background: var(--bg-card-hover); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-hover); }
    .btn-icon { padding: 12px; }

    .unit-toggle {
      display: flex;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .unit-btn {
      padding: 10px 14px;
      border: none;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .unit-btn.active { background: var(--accent); color: white; }

    .current-weather {
      padding: 40px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      min-height: 280px;
      display: flex;
      align-items: center;
    }

    .current-weather::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.15;
      transition: background 0.5s ease;
      z-index: 0;
    }

    .current-weather.weather-clear::before { background: var(--gradient-sunny); }
    .current-weather.weather-cloudy::before { background: var(--gradient-cloudy); }
    .current-weather.weather-rainy::before { background: var(--gradient-rainy); }
    .current-weather.weather-snowy::before { background: var(--gradient-snowy); }
    .current-weather.weather-stormy::before { background: var(--gradient-stormy); }
    .current-weather.weather-foggy::before { background: var(--gradient-foggy); }

    .current-content { position: relative; z-index: 1; width: 100%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px; }

    .current-left { display: flex; flex-direction: column; gap: 8px; }
    .current-city { font-size: 1.25rem; font-weight: 600; color: var(--text-secondary); }
    .current-temp { font-size: 5rem; font-weight: 800; letter-spacing: -3px; line-height: 1; }
    .current-condition { font-size: 1.1rem; font-weight: 500; color: var(--text-secondary); }
    .current-date { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }
    .current-high-low { font-size: 0.95rem; color: var(--text-secondary); margin-top: 4px; }

    .current-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .weather-icon-container {
      width: 120px;
      height: 120px;
      position: relative;
    }

    .weather-icon-sun {
      width: 80px;
      height: 80px;
      background: #fbbf24;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 40px rgba(251, 191, 36, 0.6);
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .sun-rays {
      width: 100px;
      height: 100px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 20s linear infinite;
    }

    .sun-ray {
      width: 3px;
      height: 16px;
      background: #fbbf24;
      position: absolute;
      top: 0;
      left: 50%;
      transform-origin: 50% 50px;
      border-radius: 2px;
    }

    .weather-icon-cloud {
      width: 100px;
      height: 40px;
      background: #e5e7eb;
      border-radius: 40px;
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%) translateX(0); }
      50% { transform: translate(-50%, -50%) translateX(8px); }
    }

    .weather-icon-cloud::before {
      content: '';
      width: 50px;
      height: 50px;
      background: #e5e7eb;
      border-radius: 50%;
      position: absolute;
      top: -25px;
      left: 15px;
    }

    .weather-icon-cloud::after {
      content: '';
      width: 40px;
      height: 40px;
      background: #e5e7eb;
      border-radius: 50%;
      position: absolute;
      top: -18px;
      left: 45px;
    }

    .cloud-container { animation: float 4s ease-in-out infinite; }

    .weather-icon-rain {
      width: 100px;
      height: 40px;
      background: #9ca3af;
      border-radius: 40px;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .weather-icon-rain::before {
      content: '';
      width: 50px;
      height: 50px;
      background: #9ca3af;
      border-radius: 50%;
      position: absolute;
      top: -25px;
      left: 15px;
    }

    .weather-icon-rain::after {
      content: '';
      width: 40px;
      height: 40px;
      background: #9ca3af;
      border-radius: 50%;
      position: absolute;
      top: -18px;
      left: 45px;
    }

    @keyframes rain {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(30px); opacity: 0; }
    }

    .raindrops { position: absolute; top: 60%; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
    .raindrop {
      width: 2px;
      height: 12px;
      background: #60a5fa;
      border-radius: 2px;
      animation: rain 1s ease-in infinite;
    }

    .weather-icon-snow {
      width: 100px;
      height: 40px;
      background: #d1d5db;
      border-radius: 40px;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .weather-icon-snow::before {
      content: '';
      width: 50px;
      height: 50px;
      background: #d1d5db;
      border-radius: 50%;
      position: absolute;
      top: -25px;
      left: 15px;
    }

    .weather-icon-snow::after {
      content: '';
      width: 40px;
      height: 40px;
      background: #d1d5db;
      border-radius: 50%;
      position: absolute;
      top: -18px;
      left: 45px;
    }

    @keyframes snowfall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(30px) rotate(180deg); opacity: 0.3; }
    }

    .snowflakes { position: absolute; top: 60%; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
    .snowflake {
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      animation: snowfall 2s ease-in-out infinite;
    }

    @keyframes flash {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .lightning {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 50px;
      background: #fbbf24;
      clip-path: polygon(50% 0%, 100% 45%, 60% 45%, 80% 100%, 20% 55%, 55% 55%, 0% 10%);
      animation: flash 3s ease-in-out infinite;
    }

    .weather-icon-fog {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .fog-line {
      width: 80px;
      height: 3px;
      background: rgba(156, 163, 175, 0.6);
      border-radius: 3px;
    }

    .fog-line:nth-child(2) { width: 100px; margin-left: 10px; }
    .fog-line:nth-child(3) { width: 60px; margin-left: -10px; }
    .fog-line:nth-child(4) { width: 90px; margin-left: 5px; }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .detail-card {
      padding: 20px;
      text-align: center;
    }

    .detail-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .detail-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .detail-value { font-size: 1.4rem; font-weight: 700; }
    .detail-unit { font-size: 0.8rem; color: var(--text-secondary); margin-left: 2px; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hourly-section { margin-bottom: 24px; overflow: hidden; }
    .hourly-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scroll-snap-type: x mandatory; }
    .hourly-scroll::-webkit-scrollbar { height: 6px; }
    .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
    .hourly-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .hourly-card {
      min-width: 90px;
      padding: 16px 12px;
      text-align: center;
      scroll-snap-align: start;
      flex-shrink: 0;
    }

    .hourly-time { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    .hourly-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .hourly-temp { font-size: 1rem; font-weight: 600; }

    .daily-section { margin-bottom: 24px; }
    .daily-card { padding: 16px 20px; }
    .daily-list { display: flex; flex-direction: column; gap: 8px; }
    .daily-item {
      display: grid;
      grid-template-columns: 100px 40px 1fr 80px;
      align-items: center;
      gap: 16px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .daily-item:last-child { border-bottom: none; }
    .daily-day { font-weight: 500; }
    .daily-icon { font-size: 1.25rem; text-align: center; }
    .daily-temp-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    .daily-temp-low { color: var(--text-muted); min-width: 32px; text-align: right; }
    .daily-temp-high { min-width: 32px; }

    .temp-bar-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .temp-bar-fill {
      position: absolute;
      height: 100%;
      border-radius: 2px;
      background: var(--gradient-sunny);
    }

    .daily-precip { font-size: 0.8rem; color: var(--text-muted); text-align: right; }

    .fallback-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 24px;
    }

    .fallback-title { font-size: 1.25rem; font-weight: 600; text-align: center; }
    .fallback-subtitle { color: var(--text-secondary); text-align: center; max-width: 400px; font-size: 0.9rem; }

    .city-dropdown {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 600px;
    }

    .city-btn {
      padding: 14px 16px;
      text-align: center;
      cursor: pointer;
      font-weight: 500;
    }

    .city-btn:hover { background: var(--bg-card-hover); }
    .city-name { font-size: 0.95rem; }
    .city-country { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 20px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .loading-dots { display: flex; gap: 8px; }
    .loading-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    .loading-text { color: var(--text-secondary); font-size: 0.9rem; }

    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
      text-align: center;
    }

    .error-icon { font-size: 3rem; }
    .error-message { color: var(--danger); font-size: 0.95rem; }

    .weather-emoji { font-size: 2rem; }

    @media (max-width: 768px) {
      .app-container { padding: 16px 12px 40px; }
      .header { padding: 16px; flex-direction: column; align-items: stretch; }
      .header-actions { justify-content: center; }
      .search-input { width: 100%; }
      .current-weather { padding: 24px; }
      .current-content { flex-direction: column; text-align: center; }
      .current-temp { font-size: 4rem; }
      .details-grid { grid-template-columns: repeat(2, 1fr); }
      .daily-item { grid-template-columns: 80px 32px 1fr 60px; gap: 8px; }
    }

    @media (max-width: 480px) {
      .details-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .city-dropdown { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const MAJOR_CITIES = [
      { name: "New York", country: "United States", lat: 40.7128, lon: -74.0060 },
      { name: "London", country: "United Kingdom", lat: 51.5074, lon: -0.1278 },
      { name: "Tokyo", country: "Japan", lat: 35.6762, lon: 139.6503 },
      { name: "Sydney", country: "Australia", lat: -33.8688, lon: 151.2093 },
      { name: "Paris", country: "France", lat: 48.8566, lon: 2.3522 },
      { name: "Dubai", country: "UAE", lat: 25.2048, lon: 55.2708 },
      { name: "Singapore", country: "Singapore", lat: 1.3521, lon: 103.8198 },
      { name: "San Francisco", country: "United States", lat: 37.7749, lon: -122.4194 },
      { name: "Berlin", country: "Germany", lat: 52.5200, lon: 13.4050 },
      { name: "Mumbai", country: "India", lat: 19.0760, lon: 72.8777 },
    ];

    const WMO_CODES = {
      0: { label: "Clear Sky", type: "clear", emoji: "\u2600\uFE0F" },
      1: { label: "Mainly Clear", type: "clear", emoji: "\u26C5" },
      2: { label: "Partly Cloudy", type: "cloudy", emoji: "\u26C5" },
      3: { label: "Overcast", type: "cloudy", emoji: "\u2601\uFE0F" },
      45: { label: "Foggy", type: "foggy", emoji: "🌫️" },
      48: { label: "Rime Fog", type: "foggy", emoji: "🌫️" },
      51: { label: "Light Drizzle", type: "rainy", emoji: "🌦️" },
      53: { label: "Drizzle", type: "rainy", emoji: "🌧️" },
      55: { label: "Heavy Drizzle", type: "rainy", emoji: "🌧️" },
      61: { label: "Light Rain", type: "rainy", emoji: "🌧️" },
      63: { label: "Rain", type: "rainy", emoji: "🌧️" },
      65: { label: "Heavy Rain", type: "rainy", emoji: "🌧️" },
      71: { label: "Light Snow", type: "snowy", emoji: "\u2744\uFE0F" },
      73: { label: "Snow", type: "snowy", emoji: "\u2744\uFE0F" },
      75: { label: "Heavy Snow", type: "snowy", emoji: "\u2744\uFE0F" },
      77: { label: "Snow Grains", type: "snowy", emoji: "\u2744\uFE0F" },
      80: { label: "Rain Showers", type: "rainy", emoji: "🌦️" },
      81: { label: "Showers", type: "rainy", emoji: "🌦️" },
      82: { label: "Heavy Showers", type: "rainy", emoji: "🌧️" },
      85: { label: "Snow Showers", type: "snowy", emoji: "🌨️" },
      86: { label: "Heavy Snow Showers", type: "snowy", emoji: "🌨️" },
      95: { label: "Thunderstorm", type: "stormy", emoji: "\u26C8\uFE0F" },
      96: { label: "Thunderstorm w/ Hail", type: "stormy", emoji: "\u26C8\uFE0F" },
      99: { label: "Thunderstorm w/ Heavy Hail", type: "stormy", emoji: "\u26C8\uFE0F" },
    };

    function getWeatherInfo(code) {
      return WMO_CODES[code] || { label: "Unknown", type: "cloudy", emoji: "🌥️" };
    }

    function convertTemp(c, unit) {
      if (unit === "F") return Math.round(c * 9/5 + 32);
      return Math.round(c);
    }

    function convertWind(kmh, unit) {
      if (unit === "mph") return Math.round(kmh * 0.621371);
      return Math.round(kmh);
    }

    function windDirection(degrees) {
      const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
      return dirs[Math.round(degrees / 22.5) % 16];
    }

    const WeatherIcon = React.memo(function WeatherIcon({ code, size = "medium" }) {
      const info = getWeatherInfo(code);
      const sizeMap = { small: "1.25rem", medium: "1.5rem", large: "2rem", hero: "3rem" };
      return <span style={{ fontSize: sizeMap[size] }}>{info.emoji}</span>;
    });

    const AnimatedIcon = React.memo(function AnimatedIcon({ type }) {
      if (type === "clear") {
        return (
          <div className="weather-icon-container">
            <div className="sun-rays">
              {Array.from({ length: 12 }).map((_, i) => (
                <div key={i} className="sun-ray" style={{ transform: `rotate(${i * 30}deg)` }} />
              ))}
            </div>
            <div className="weather-icon-sun" />
          </div>
        );
      }
      if (type === "cloudy") {
        return (
          <div className="weather-icon-container">
            <div className="cloud-container">
              <div className="weather-icon-cloud" />
            </div>
          </div>
        );
      }
      if (type === "rainy") {
        return (
          <div className="weather-icon-container">
            <div className="weather-icon-rain" />
            <div className="raindrops">
              {Array.from({ length: 5 }).map((_, i) => (
                <div key={i} className="raindrop" style={{ animationDelay: `${i * 0.15}s` }} />
              ))}
            </div>
          </div>
        );
      }
      if (type === "snowy") {
        return (
          <div className="weather-icon-container">
            <div className="weather-icon-snow" />
            <div className="snowflakes">
              {Array.from({ length: 5 }).map((_, i) => (
                <div key={i} className="snowflake" style={{ animationDelay: `${i * 0.3}s`, width: `${4 + i}px`, height: `${4 + i}px` }} />
              ))}
            </div>
          </div>
        );
      }
      if (type === "stormy") {
        return (
          <div className="weather-icon-container">
            <div className="weather-icon-rain" />
            <div className="raindrops">
              {Array.from({ length: 5 }).map((_, i) => (
                <div key={i} className="raindrop" style={{ animationDelay: `${i * 0.1}s` }} />
              ))}
            </div>
            <div className="lightning" />
          </div>
        );
      }
      if (type === "foggy") {
        return (
          <div className="weather-icon-container">
            <div className="weather-icon-fog">
              <div className="fog-line" />
              <div className="fog-line" />
              <div className="fog-line" />
              <div className="fog-line" />
            </div>
          </div>
        );
      }
      return <div className="weather-icon-container"><div className="weather-icon-cloud" /></div>;
    });

    function LoadingState() {
      return (
        <div>
          <div className="skeleton skeleton-hero" />
          <div className="skeleton-grid">
            {Array.from({ length: 6 }).map((_, i) => <div key={i} className="skeleton skeleton-card" />)}
          </div>
          <div style={{ display: "flex", gap: "12px", overflow: "hidden", marginBottom: "24px" }}>
            {Array.from({ length: 5 }).map((_, i) => <div key={i} className="skeleton skeleton-hourly" />)}
          </div>
          {Array.from({ length: 5 }).map((_, i) => <div key={i} className="skeleton skeleton-daily" />)}
        </div>
      );
    }

    const CurrentWeather = React.memo(function CurrentWeather({ data, cityName, units }) {
      const info = getWeatherInfo(data.current.weather_code);
      const now = new Date();
      const dateStr = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
      const timeStr = now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

      return (
        <div className={`current-weather glass-card weather-${info.type}`}>
          <div className="current-content">
            <div className="current-left">
              <div className="current-city">{cityName || "Your Location"}</div>
              <div className="current-temp">{convertTemp(data.current.temperature_2m, units.temp)}°{units.temp}</div>
              <div className="current-condition">{info.emoji} {info.label}</div>
              <div className="current-high-low">H: {convertTemp(data.daily.temperature_2m_max[0], units.temp)}° L: {convertTemp(data.daily.temperature_2m_min[0], units.temp)}°</div>
              <div className="current-date">{dateStr} · {timeStr}</div>
            </div>
            <div className="current-right">
              <AnimatedIcon type={info.type} />
            </div>
          </div>
        </div>
      );
    });

    const WeatherDetails = React.memo(function WeatherDetails({ data, units }) {
      const sunrise = data.daily.sunrise[0] ? new Date(data.daily.sunrise[0]).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }) : "--";
      const sunset = data.daily.sunset[0] ? new Date(data.daily.sunset[0]).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }) : "--";
      const aqi = data.aqi;
      let aqiLabel = "Good";
      let aqiColor = "#22c55e";
      if (aqi !== null && aqi !== undefined) {
        if (aqi <= 50) { aqiLabel = "Good"; aqiColor = "#22c55e"; }
        else if (aqi <= 100) { aqiLabel = "Moderate"; aqiColor = "#eab308"; }
        else if (aqi <= 150) { aqiLabel = "Unhealthy (Sensitive)"; aqiColor = "#f97316"; }
        else if (aqi <= 200) { aqiLabel = "Unhealthy"; aqiColor = "#ef4444"; }
        else if (aqi <= 300) { aqiLabel = "Very Unhealthy"; aqiColor = "#a855f7"; }
        else { aqiLabel = "Hazardous"; aqiColor = "#7f1d1d"; }
      }

      const details = [
        { icon: "💧", label: "Humidity", value: data.current.relative_humidity_2m, unit: "%" },
        { icon: "💨", label: "Wind", value: `${convertWind(data.current.wind_speed_10m, units.wind)} ${windDirection(data.current.wind_direction_10m)}`, unit: units.wind === "mph" ? "mph" : "km/h" },
        { icon: "🌬️", label: "Gusts", value: convertWind(data.current.wind_gusts_10m, units.wind), unit: units.wind === "mph" ? " mph" : " km/h" },
        { icon: "☀️", label: "UV Index", value: Math.round(data.daily.uv_index_max[0] * 10) / 10, unit: "" },
        { icon: "🌡️", label: "Pressure", value: Math.round(data.current.surface_pressure), unit: " hPa" },
        { icon: "🤔", label: "Feels Like", value: convertTemp(data.current.apparent_temperature, units.temp), unit: `°${units.temp}` },
        { icon: "🌅", label: "Sunrise", value: sunrise, unit: "" },
        { icon: "🌇", label: "Sunset", value: sunset, unit: "" },
        { icon: "🫁", label: "AQI", value: aqi !== null && aqi !== undefined ? aqi : "N/A", unit: aqi !== null && aqi !== undefined ? ` (${aqiLabel})` : "" },
      ];

      return (
        <div className="details-grid">
          {details.map((d, i) => (
            <div key={i} className="glass-card detail-card" style={d.unit.includes(aqiLabel) ? { borderColor: aqiColor } : {}}>
              <div className="detail-icon">{d.icon}</div>
              <div className="detail-label">{d.label}</div>
              <div className="detail-value">{d.value}<span className="detail-unit">{d.unit}</span></div>
            </div>
          ))}
        </div>
      );
    });

    const HourlyForecast = React.memo(function HourlyForecast({ data, units }) {
      const currentHour = new Date().getHours();
      const hours = [];
      const startIdx = data.hourly.time.findIndex(t => {
        const d = new Date(t);
        return d.getHours() === currentHour && d.getDate() === new Date().getDate();
      });
      for (let i = 0; i < 24; i++) {
        const itemIdx = (startIdx >= 0 ? startIdx : 0) + i;
        if (itemIdx >= data.hourly.time.length) break;

        const time = new Date(data.hourly.time[itemIdx]);
        hours.push({
          time: i === 0 ? "Now" : time.toLocaleTimeString("en-US", { hour: "numeric" }),
          temp: convertTemp(data.hourly.temperature_2m[itemIdx], units.temp),
          code: data.hourly.weather_code[itemIdx],
          precip: data.hourly.precipitation_probability[itemIdx] != null ? data.hourly.precipitation_probability[itemIdx] : null,
        });
      }

      return (
        <div className="hourly-section">
          <div className="section-title">🕐 24-Hour Forecast</div>
          <div className="hourly-scroll">
            {hours.map((h, i) => (
              <div key={i} className="glass-card hourly-card">
                <div className="hourly-time">{h.time}</div>
                <div className="hourly-icon"><WeatherIcon code={h.code} /></div>
                <div className="hourly-temp">{h.temp}°</div>
                {h.precip !== null && <div style={{ fontSize: "0.7rem", color: "var(--text-muted)", marginTop: "2px" }}>{h.precip}%💧</div>}
              </div>
            ))}
          </div>
        </div>
      );
    });

    const DailyForecast = React.memo(function DailyForecast({ data, units }) {
      const allTemps = [...data.daily.temperature_2m_min, ...data.daily.temperature_2m_max];
      const globalMin = Math.min(...allTemps);
      const globalMax = Math.max(...allTemps);
      const range = globalMax - globalMin || 1;

      const days = data.daily.time.map((t, i) => ({
        date: new Date(t + "T00:00:00"),
        day: i === 0 ? "Today" : new Date(t + "T00:00:00").toLocaleDateString("en-US", { weekday: "short" }),
        code: data.daily.weather_code[i],
        min: convertTemp(data.daily.temperature_2m_min[i], units.temp),
        max: convertTemp(data.daily.temperature_2m_max[i], units.temp),
        minRaw: data.daily.temperature_2m_min[i],
        maxRaw: data.daily.temperature_2m_max[i],
        precip: data.daily.precipitation_probability_max[i] != null ? data.daily.precipitation_probability_max[i] : null,
      }));

      return (
        <div className="daily-section">
          <div className="section-title">📅 7-Day Forecast</div>
          <div className="glass-card daily-card">
            <div className="daily-list">
              {days.map((d, i) => {
                const leftPct = ((d.minRaw - globalMin) / range) * 100;
                const widthPct = ((d.maxRaw - d.minRaw) / range) * 100;
                return (
                  <div key={i} className="daily-item">
                    <div className="daily-day">{d.day}</div>
                    <div className="daily-icon"><WeatherIcon code={d.code} size="small" /></div>
                    <div className="daily-temp-bar">
                      <span className="daily-temp-low">{d.min}°</span>
                      <div className="temp-bar-track">
                        <div className="temp-bar-fill" style={{ left: `${leftPct}%`, width: `${Math.max(widthPct, 8)}%` }} />
                      </div>
                      <span className="daily-temp-high">{d.max}°</span>
                    </div>
                    <div className="daily-precip">
                      <WeatherIcon code={d.code} />
                      {d.precip !== null && <div style={{ fontSize: "0.7rem", marginTop: "2px" }}>{d.precip}%</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    });

    const App = () => {
      const [weatherData, setWeatherData] = useState(null);
      const [cityName, setCityName] = useState("");
      const [theme, setTheme] = useState(() => localStorage.getItem("weather-theme") || "dark");
      const [units, setUnits] = useState(() => {
        const saved = localStorage.getItem("weather-units");
        return saved ? JSON.parse(saved) : { temp: "C", wind: "kmh" };
      });
      const [searchQuery, setSearchQuery] = useState("");
      const [searchResults, setSearchResults] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState(null);
      const [fallbackMode, setFallbackMode] = useState(false);
      const [locError, setLocError] = useState(null);
      const [recentSearches, setRecentSearches] = useState(() => {
        try { return JSON.parse(localStorage.getItem("weather-recent") || "[]"); } catch { return []; }
      });
      const [contentVisible, setContentVisible] = useState(false);
      const [showShareToast, setShowShareToast] = useState(false);
      const searchRef = useRef(null);
      const debounceRef = useRef(null);
      const refreshTimerRef = useRef(null);

      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("weather-theme", theme);
      }, [theme]);

      useEffect(() => {
        localStorage.setItem("weather-units", JSON.stringify(units));
      }, [units]);

      const fetchWeather = useCallback(async (lat, lon, name) => {
        if (lat == null || lon == null || isNaN(lat) || isNaN(lon)) {
          setError("Invalid coordinates provided");
          setIsLoading(false);
          return;
        }
        lat = parseFloat(lat);
        lon = parseFloat(lon);
        setContentVisible(false);
        setIsLoading(true);
        setError(null);
        if (debounceRef.current) clearTimeout(debounceRef.current);
        try {
          const [weatherRes, aqiRes] = await Promise.all([
            fetch(
              `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,surface_pressure&hourly=temperature_2m,weather_code,wind_speed_10m,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,uv_index_max,sunrise,sunset,precipitation_probability_max&timezone=auto&forecast_days=7`
            ),
            fetch(
              `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`
            )
          ]);
          if (!weatherRes.ok) throw new Error("Failed to fetch weather data");
          const weatherData = await weatherRes.json();
          if (aqiRes.ok) {
            const aqiData = await aqiRes.json();
            weatherData.aqi = aqiData.current?.us_aqi || null;
          }
          setWeatherData(weatherData);
          setCityName(name);
          setFallbackMode(false);
          setLocError(null);
          if (name !== "Your Location") {
            setRecentSearches(prev => {
              const entry = { name: name, latitude: lat, longitude: lon };
              const updated = [entry, ...prev.filter(s => s.name !== name)].slice(0, 5);
              localStorage.setItem("weather-recent", JSON.stringify(updated));
              return updated;
            });
          }
          setTimeout(() => { setIsLoading(false); setContentVisible(true); }, 300);
          if (refreshTimerRef.current) clearInterval(refreshTimerRef.current);
          refreshTimerRef.current = setInterval(() => fetchWeather(lat, lon, name), 600000);
        } catch (e) {
          setError(e.message);
          setIsLoading(false);
        }
      }, []);

      const searchCities = useCallback((query) => {
        setSearchQuery(query);
        if (debounceRef.current) clearTimeout(debounceRef.current);
        if (query.length < 2) { setSearchResults([]); return; }
        debounceRef.current = setTimeout(async () => {
          try {
            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5`);
            const data = await res.json();
            setSearchResults(data.results || []);
          } catch (e) {
            console.error("Search error:", e);
          }
        }, 300);
      }, []);

      const handleLocationRequest = useCallback(() => {
        setLocError(null);
        setIsLoading(true);
        setFallbackMode(false);
        if (!navigator.geolocation) {
          setLocError("Geolocation is not supported by your browser");
          setFallbackMode(true);
          setIsLoading(false);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setLocError(null);
            fetchWeather(pos.coords.latitude, pos.coords.longitude, "Your Location");
          },
          (err) => {
            let msg = "Location access denied.";
            if (err.code === 1) msg = "Location permission denied. Please select a city below or allow location access.";
            else if (err.code === 2) msg = "Location unavailable. Please select a city below.";
            else if (err.code === 3) msg = "Location request timed out. Please try again.";
            setLocError(msg);
            setFallbackMode(true);
            setIsLoading(false);
          },
          { timeout: 10000, enableHighAccuracy: true }
        );
      }, [fetchWeather]);

      useEffect(() => {
        handleLocationRequest();
      }, []);

      useEffect(() => {
        const handleClick = (e) => {
          if (searchRef.current && !searchRef.current.contains(e.target)) setSearchResults([]);
        };
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === "Escape") { setSearchResults([]); setSearchQuery(""); }
          if (e.key === "l" || e.key === "L") { if (document.activeElement.tagName !== "INPUT") handleLocationRequest(); }
          if (e.key === "t" || e.key === "T") { if (document.activeElement.tagName !== "INPUT") toggleTheme(); }
        };
        document.addEventListener("keydown", handleKeyDown);
        return () => document.removeEventListener("keydown", handleKeyDown);
      }, [handleLocationRequest, toggleTheme]);

      useEffect(() => {
        return () => { if (refreshTimerRef.current) clearInterval(refreshTimerRef.current); };
      }, []);

      const toggleTheme = () => setTheme(t => t === "dark" ? "light" : "dark");

      const shareWeather = useCallback(() => {
        if (!weatherData) return;
        const info = getWeatherInfo(weatherData.current.weather_code);
        const text = `Weather in ${cityName || "Your Location"}: ${convertTemp(weatherData.current.temperature_2m, units.temp)}°${units.temp}, ${info.label}. H:${convertTemp(weatherData.daily.temperature_2m_max[0], units.temp)}° L:${convertTemp(weatherData.daily.temperature_2m_min[0], units.temp)}°`;
        navigator.clipboard.writeText(text).then(() => {
          setShowShareToast(true);
          setTimeout(() => setShowShareToast(false), 2000);
        });
      }, [weatherData, cityName, units]);

      const weatherAlert = useMemo(() => {
        if (!weatherData) return null;
        const code = weatherData.current.weather_code;
        if (code >= 95) return { level: "severe", title: "Thunderstorm Warning", desc: "Severe thunderstorm conditions detected. Stay safe!" };
        if (code >= 80 && code <= 82) return { level: "moderate", title: "Heavy Rain Alert", desc: "Heavy rain showers expected. Carry an umbrella." };
        if (code >= 65) return { level: "moderate", title: "Heavy Rain Alert", desc: "Heavy rain conditions. Exercise caution." };
        if (code >= 75) return { level: "moderate", title: "Heavy Snow Alert", desc: "Heavy snow conditions. Drive carefully." };
        return null;
      }, [weatherData]);

      return (
        <div className="app-container">
          {weatherData && <div className="animated-bg" style={{ background: getWeatherInfo(weatherData.current.weather_code).type === "clear" ? "var(--gradient-sunny)" : getWeatherInfo(weatherData.current.weather_code).type === "rainy" ? "var(--gradient-rainy)" : getWeatherInfo(weatherData.current.weather_code).type === "snowy" ? "var(--gradient-snowy)" : getWeatherInfo(weatherData.current.weather_code).type === "stormy" ? "var(--gradient-stormy)" : getWeatherInfo(weatherData.current.weather_code).type === "foggy" ? "var(--gradient-foggy)" : "var(--gradient-cloudy)" }} />}
          <div className="header glass-card">
            <div className="logo">
              <div className="logo-icon">⛅</div>
              <span>Weather</span>
            </div>
            <div className="header-actions">
              <div ref={searchRef} className="search-container">
                <span className="search-icon">🔍</span>
                <input
                  className="search-input"
                  type="text"
                  placeholder="Search city..."
                  value={searchQuery}
                  onChange={e => searchCities(e.target.value)}
                  aria-label="Search for a city"
                  role="combobox"
                  aria-expanded={searchResults.length > 0}
                />
                {searchResults.length > 0 && (
                  <div className="search-results">
                    {searchResults.map(r => (
                      <div key={r.id} className="search-result-item" onClick={() => {
                        fetchWeather(r.latitude, r.longitude, `${r.name}, ${r.country}`);
                        setSearchResults([]);
                        setSearchQuery("");
                      }}>
                        <div className="search-result-name">{r.name}</div>
                        <div className="search-result-country">{r.admin1 || ""} {r.country}</div>
                      </div>
                    ))}
                  </div>
                )}
                {searchResults.length === 0 && searchQuery.length === 0 && recentSearches.length > 0 && (
                  <div className="search-results">
                    <div style={{ padding: "8px 16px", fontSize: "0.75rem", color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.5px" }}>Recent</div>
                    {recentSearches.map((r, i) => (
                      <div key={i} className="search-result-item" onClick={() => fetchWeather(r.latitude, r.longitude, r.name)}>
                        <div className="search-result-name">{r.name}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <button className="btn btn-icon" onClick={handleLocationRequest} title="Use my location" aria-label="Use my current location">
                📍
              </button>
              <div className="unit-toggle">
                <button className={`unit-btn ${units.temp === "C" ? "active" : ""}`} onClick={() => setUnits(u => ({ ...u, temp: "C" }))}>°C</button>
                <button className={`unit-btn ${units.temp === "F" ? "active" : ""}`} onClick={() => setUnits(u => ({ ...u, temp: "F" }))}>°F</button>
              </div>
              <div className="unit-toggle">
                <button className={`unit-btn ${units.wind === "kmh" ? "active" : ""}`} onClick={() => setUnits(u => ({ ...u, wind: "kmh" }))}>km/h</button>
                <button className={`unit-btn ${units.wind === "mph" ? "active" : ""}`} onClick={() => setUnits(u => ({ ...u, wind: "mph" }))}>mph</button>
              </div>
              <button className="btn btn-icon" onClick={toggleTheme} title="Toggle theme" aria-label={`Switch to ${theme === "dark" ? "light" : "dark"} theme`}>
                {theme === "dark" ? "☀️" : "🌙"}
              </button>
            </div>
          </div>

          {weatherAlert && !isLoading && (
            <div className="alert-banner fade-in" role="alert">
              <span className="alert-icon">⚠️</span>
              <div className="alert-text">
                <div className="alert-title">{weatherAlert.title}</div>
                <div className="alert-desc">{weatherAlert.desc}</div>
              </div>
            </div>
          )}

          {isLoading && <LoadingState />}
          {error && (
            <div className="error-container">
              <div className="error-icon">⚠️</div>
              <div className="error-message">{error}</div>
              <button className="btn btn-accent" onClick={handleLocationRequest}>Try Again</button>
            </div>
          )}
          {fallbackMode && !isLoading && (
            <div className="fallback-container">
              {locError && <div className="error-message" style={{ maxWidth: "400px", textAlign: "center" }}>{locError}</div>}
              <div className="fallback-title">Select a City</div>
              <div className="fallback-subtitle">Geolocation is unavailable. Pick a city to see its weather.</div>
              <button className="btn btn-accent" onClick={handleLocationRequest}>
                📍 Try My Location Again
              </button>
              <div className="city-dropdown">
                {MAJOR_CITIES.map(city => (
                  <div key={city.name} className="glass-card city-btn" onClick={() => fetchWeather(city.lat, city.lon, `${city.name}, ${city.country}`)}>
                    <div className="city-name">{city.name}</div>
                    <div className="city-country">{city.country}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {weatherData && !isLoading && (
            <div className={`fade-in ${contentVisible ? "" : "fade-in"}`}>
              <CurrentWeather data={weatherData} cityName={cityName} units={units} />
              <WeatherDetails data={weatherData} units={units} />
              <HourlyForecast data={weatherData} units={units} />
              <DailyForecast data={weatherData} units={units} />
            </div>
          )}
          {weatherData && !isLoading && (
            <>
              <button className="share-btn" onClick={shareWeather} aria-label="Share weather" title="Copy weather to clipboard">📋</button>
              {showShareToast && <div className="share-toast">Copied to clipboard!</div>}
            </>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

    if ("serviceWorker" in navigator) {
      const swCode = `
        const CACHE = "weather-v1";
        self.addEventListener("install", e => { self.skipWaiting(); });
        self.addEventListener("activate", e => { e.waitUntil(clients.claim()); });
        self.addEventListener("fetch", e => {
          if (e.request.url.includes("open-meteo.com")) {
            e.respondWith(
              caches.open(CACHE).then(cache =>
                fetch(e.request).then(res => {
                  cache.put(e.request, res.clone());
                  return res;
                }).catch(() => caches.match(e.request))
              )
            );
          }
        });
      `;
      const blob = new Blob([swCode], { type: "application/javascript" });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
</body>
</html>
